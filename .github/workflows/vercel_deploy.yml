name: Deploy to Vercel on Push or Merge
on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
    branches: [main]
jobs:
  deploy:
    if: |
      (github.event_name == 'push' && (
        github.actor == 'b4ked' ||
        github.actor == 'parryh' ||
        github.actor == 'AltApe1' ||
        github.actor == 'altape1' ||
        github.actor == 'claude' ||
        github.actor == 'claude-code'
      )) ||
      (github.event_name == 'pull_request' &&
        github.event.pull_request.merged == true && (
        github.event.pull_request.merged_by.login == 'b4ked' ||
        github.event.pull_request.merged_by.login == 'parryh' ||
        github.event.pull_request.merged_by.login == 'AltApe1' ||
        github.event.pull_request.merged_by.login == 'altape1' ||
        github.event.pull_request.merged_by.login == 'claude' ||
        github.event.pull_request.merged_by.login == 'claude-code'
      ))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install --global vercel@latest
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_AIVOICEREVIEW }}
      - name: Deploy
        run: |
          git remote remove origin || true
          vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_AIVOICEREVIEW }}
